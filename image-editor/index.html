<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Online Image Editor | Adjust Brightness, Contrast, Blur, and More</title>
    <meta name="description" content="Edit images online for free with real-time filters like brightness, contrast, saturation, hue rotation, blur, grayscale, sepia, opacity, and invert. No signup required." />
    <meta name="keywords" content="online image editor, photo editor, free image editor, browser image editor, brightness contrast editor, blur image online" />
    <meta name="author" content="Himanshu Sonkar" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Free Online Image Editor" />
    <meta property="og:description" content="Use quick sliders and presets to edit your photo directly in the browser." />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Online Image Editor" />
    <meta name="twitter:description" content="Edit images online with fast controls and export in one click." />
    <meta name="twitter:image" content="https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Free Online Image Editor",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any",
        "description": "A browser-based image editor with real-time filter controls and downloadable output.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 class="srOnly">Free Online Image Editor</h1>
      <p class="srOnly">Upload an image and adjust brightness, contrast, saturation, hue rotation, blur, grayscale, sepia, opacity, and invert in real time.</p>
    </header>
    <div class="container">
      <!-- left side container -->
      <div id="leftContainer">
        <!-- action button -->
        <div id="actionBtnContainer">
          <button class="actionBtn actionBtn--primary" id="Btn1">Choose Image</button>
          <button class="actionBtn actionBtn--neutral" id="Btn2">Reset</button>
          <button class="actionBtn actionBtn--success" id="Btn3">Download</button>
          <input id="imageInput" type="file" accept=".png,.jpg,.jpeg,image/png,image/jpeg" max="1">
        </div>

        <!-- image screen -->
        <div id="imageScreen">
            <img id="image" src="https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png" alt="placeholder" width="400">
        </div>
      </div>
      <!-- right side editor control -->
      <div id="editor">
        <div class="editorHeader">
          <h1>Filters</h1>
          <p>Adjust the image with balanced, modern controls.</p>
        </div>
        <div class="filtersGrid">
          <div class="filterItem">
            <label for="brightness">brightness</label>
            <input class="controls" id="brightness" type="range" min="0" max="200" value="100" />
          </div>
          <div class="filterItem">
            <label for="contrast">contrast</label>
            <input class="controls" id="contrast" type="range" min="0" max="200" value="100" />
          </div>
          <div class="filterItem">
            <label for="saturation">saturation</label>
            <input class="controls" id="saturation" type="range" min="0" max="200" value="100" />
          </div>
          <div class="filterItem">
            <label for="hueRotation">hue rotation</label>
            <input class="controls" id="hueRotation" type="range" min="0" max="360" value="0" />
          </div>
          <div class="filterItem">
            <label for="blur">blur</label>
            <input class="controls" id="blur" type="range" min="0" max="20" value="0" />
          </div>
          <div class="filterItem">
            <label for="grayscale">grayscale</label>
            <input class="controls" id="grayscale" type="range" min="0" max="100" value="0" />
          </div>
          <div class="filterItem">
            <label for="sepia">sepia</label>
            <input class="controls" id="sepia" type="range" min="0" max="100" value="0" />
          </div>
          <div class="filterItem">
            <label for="opacity">opacity</label>
            <input class="controls" id="opacity" type="range" min="0" max="100" value="100" />
          </div>
          <div class="filterItem">
            <label for="invert">invert</label>
            <input class="controls" id="invert" type="range" min="0" max="100" value="0" />
          </div>
        </div>
        <div class="presetSection">
          <h2>Presets</h2>
          <div class="presetButtons">
            <button class="presetBtn" type="button" data-preset="original">Original</button>
            <button class="presetBtn" type="button" data-preset="vivid">Vivid</button>
            <button class="presetBtn" type="button" data-preset="warm">Warm</button>
            <button class="presetBtn" type="button" data-preset="mono">Mono</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
